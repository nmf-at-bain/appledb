name: notify-azfunc
on:
  push:
    paths:
      - 'osFiles/iOS/**'

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # IMPORTANT: Fetches all history so we can compare commits

      - name: Fetch Added Files and Notify Azure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use git diff to see what changed between the 'before' and 'after' state of this push
          # 'A' filter catches only Added files
          git diff --name-only --diff-filter=A ${{ github.event.before }} ${{ github.event.after }} | grep 'osFiles/iOS/' > list.txt || true

          while IFS= read -r FILE_PATH; do
            [ -z "$FILE_PATH" ] && continue

            echo "Processing sync/push file: $FILE_PATH"

            curl -X POST "${{ secrets.AZURE_FUNCTION_URL }}?code=${{ secrets.FUNCTION_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"filePath\": \"$FILE_PATH\"}"

          done < list.txt
